    <script>
      // Converte l'SVG in PNG reale per garantire compatibilità TOTALE su iOS (Home Screen) e Favicon Browser
      (function() {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="110" fill="#7e57c2"/>
          <path d="M256 310 C256 310 155 228 155 172 C155 140 178 122 202 129 C218 133 236 146 256 168 C276 146 294 133 310 129 C334 122 357 140 357 172 C357 228 256 310 256 310Z" fill="#e91e63"/>
          <ellipse cx="212" cy="145" rx="12" ry="8" fill="rgba(255,255,255,0.3)" transform="rotate(-20,212,145)"/>
          <ellipse cx="150" cy="315" rx="36" ry="36" fill="#ffcc80"/>
          <ellipse cx="150" cy="289" rx="36" ry="20" fill="#fdd835"/>
          <rect x="114" y="289" width="16" height="28" rx="8" fill="#fdd835"/>
          <rect x="170" y="289" width="16" height="28" rx="8" fill="#fdd835"/>
          <ellipse cx="137" cy="314" rx="6" ry="7" fill="white"/>
          <ellipse cx="163" cy="314" rx="6" ry="7" fill="white"/>
          <ellipse cx="139" cy="316" rx="3.5" ry="4" fill="#4e342e"/>
          <ellipse cx="165" cy="316" rx="3.5" ry="4" fill="#4e342e"/>
          <path d="M136 328 Q150 337 164 328" stroke="#e65100" stroke-width="3" fill="none" stroke-linecap="round"/>
          <rect x="110" y="349" width="84" height="74" rx="16" fill="#5e35b1"/>
          <rect x="194" y="357" width="20" height="52" rx="10" fill="#ffcc80"/>
          <ellipse cx="362" cy="315" rx="36" ry="36" fill="#ffcc80"/>
          <ellipse cx="362" cy="289" rx="36" ry="20" fill="#212121"/>
          <rect x="326" y="289" width="16" height="44" rx="8" fill="#212121"/>
          <rect x="382" y="289" width="16" height="44" rx="8" fill="#212121"/>
          <ellipse cx="349" cy="314" rx="6" ry="7" fill="white"/>
          <ellipse cx="375" cy="314" rx="6" ry="7" fill="white"/>
          <ellipse cx="351" cy="316" rx="3.5" ry="4" fill="#4e342e"/>
          <ellipse cx="377" cy="316" rx="3.5" ry="4" fill="#4e342e"/>
          <path d="M348 328 Q362 337 376 328" stroke="#e65100" stroke-width="3" fill="none" stroke-linecap="round"/>
          <ellipse cx="345" cy="323" rx="8" ry="6" fill="rgba(233,30,99,0.3)"/>
          <ellipse cx="379" cy="323" rx="8" ry="6" fill="rgba(233,30,99,0.3)"/>
          <rect x="318" y="349" width="84" height="74" rx="16" fill="#e91e63"/>
          <rect x="298" y="357" width="20" height="52" rx="10" fill="#ffcc80"/>
          <ellipse cx="256" cy="378" rx="18" ry="16" fill="#ffcc80"/>
        </svg>`;
        
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const svgBlob = new Blob([svg], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            const pngUrl = canvas.toDataURL('image/png'); // Questo crea l'immagine adatta a iOS
            
            let iconLink = document.querySelector('link[rel="icon"]');
            iconLink.type = 'image/png';
            iconLink.href = pngUrl;

            let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
            appleLink.href = pngUrl;
            
            URL.revokeObjectURL(url);
        };
        img.src = url;
      })();
    </script>

    <style>
        :root { --bg-color: #f3e5f5; --primary: #7e57c2; --primary-dark: #5e35b1; --text-dark: #2d3436; --glass: rgba(255, 255, 255, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); min-height: 100vh; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; }
        
        #login-container { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; margin-top: 50px; text-align: center; }
        .login-card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .card { background: var(--glass); border-radius: 24px; padding: 18px; box-shadow: 0 8px 32px rgba(126, 87, 194, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); }
        h1 { text-align: center; color: var(--primary-dark); margin: 5px 0 15px 0; font-size: 1.5rem; }
        h2 { font-weight: 600; font-size: 1rem; margin: 0 0 10px 0; color: var(--primary); }
        textarea, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; font-family: inherit; font-size: 16px; }
        button { background: var(--primary-dark); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        
        /* --- CALENDARIO PIÙ GRANDE --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day {
            min-height: 72px;
            background: white;
            border-radius: 10px;
            padding: 5px 4px;
            font-size: 0.72rem;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
        }
        .day:hover { background: #f0ebff; }
        .day.today { border: 2px solid var(--primary); }
        .day-num { font-weight: 700; font-size: 0.75rem; margin-bottom: 2px; color: #444; }
        .event-chip {
            color: white;
            font-size: 0.55rem;
            line-height: 1.3;
            padding: 2px 4px;
            border-radius: 5px;
            margin-top: 2px;
            word-break: break-word;
            white-space: normal;
            display: block;
        }
        .event-chip .chip-time { opacity: 0.9; font-size: 0.5rem; display: block; }

        .countdown-container { display: flex; gap: 10px; }
        .countdown-card { flex: 1; background: white; padding: 12px; border-radius: 20px; text-align: center; cursor: pointer; }
        .cd-number { font-size: 1.6rem; font-weight: 600; color: var(--primary); display: block; }
        #modal-overlay, #cd-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: white; padding: 20px; border-radius: 24px; width: 90%; max-width: 380px; }
        #shop-list li { display: flex; justify-content: space-between; background: #f8f9fa; padding: 8px; border-radius: 8px; margin-bottom: 4px; }
        .color-opt { width: 28px; height: 28px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; position: relative; }
        .color-opt:hover { transform: scale(1.12); }
        .color-opt.selected { border: 3px solid #222; transform: scale(1.2); box-shadow: 0 0 0 2px white inset; }
        .color-opt.selected::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 0.75rem; font-weight: 900; text-shadow: 0 0 2px rgba(0,0,0,0.6); }

        .time-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .time-row label { font-size: 0.8rem; color: #666; white-space: nowrap; }
        .time-row input[type="time"] { margin-bottom: 0; padding: 8px 10px; font-size: 0.9rem; }

        .existing-event-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.82rem;
            background: #f3f3f3;
            padding: 7px 10px;
            border-radius: 8px;
            gap: 8px;
        }
        .existing-event-row .ev-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .existing-event-row .ev-label { flex: 1; }
        .existing-event-row .ev-time { font-size: 0.72rem; color: #888; }
        .existing-event-row .ev-del { color: red; cursor: pointer; font-weight: 700; flex-shrink: 0; }
    </style>
</head>

        <div class="login-card">

            <input type="password" id="login-password" placeholder="La tua password">
            <button id="btn-login">Entra</button>
            <p id="login-error" style="color:red; font-size:0.8rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="main-app" class="container">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1>MeriGabri 🏠</h1>
            <button id="btn-logout" style="width: auto; padding: 5px 10px; font-size: 0.7rem; background: #999;">Esci</button>
        </div>

        <div class="card" style="background: #fff9c4;">
            <h2>💌 Note</h2>
            <textarea id="note-area" placeholder="Scrivi qui..."></textarea>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <button id="prevMonth" style="border:none; background:none; font-size:1.4rem; width:auto; padding:0 8px;">‹</button>
                <h2 id="current-month-display" style="margin:0; font-size:1.05rem;">Mese</h2>
                <button id="nextMonth" style="border:none; background:none; font-size:1.4rem; width:auto; padding:0 8px;">›</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div class="countdown-container">
            <div class="countdown-card" id="cd1">
                <div id="cd-title-1" style="font-size:0.7rem; font-weight:600;">Evento 1</div>
                <span id="cd-days-1" class="cd-number">—</span>
                <span style="font-size:0.6rem; color:#999;">GIORNI</span>
            </div>
            <div class="countdown-card" id="cd2">
                <div id="cd-title-2" style="font-size:0.7rem; font-weight:600;">Evento 2</div>
                <span id="cd-days-2" class="cd-number">—</span>
                <span style="font-size:0.6rem; color:#999;">GIORNI</span>
            </div>
        </div>

        <div class="card" style="background:#e3f2fd;">
            <h2>🛒 Spesa</h2>
            <div style="display:flex; gap:5px;"><input type="text" id="shop-input" style="margin:0;"><button id="btn-add-shop" style="padding:0 15px; border-radius:10px; border:none; background:#1976d2; color:white; width:auto;">+</button></div>
            <ul id="shop-list" style="list-style:none; padding:0; margin-top:10px;"></ul>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="modal-date-title" style="margin-top:0; color: var(--primary-dark);">Data</h3>
            <input type="text" id="event-text" placeholder="Cosa facciamo?">
            
            <div class="time-row">
                <label>⏰ Dalle</label>
                <input type="time" id="event-time-start">
                <label>alle</label>
                <input type="time" id="event-time-end">
            </div>

            <div style="display:flex; justify-content:space-around; margin-bottom:15px; flex-wrap:wrap; gap:6px;">
                <div class="color-opt" style="background:#ef5350;" data-color="#ef5350"></div>
                <div class="color-opt" style="background:#42a5f5;" data-color="#42a5f5"></div>
                <div class="color-opt" style="background:#66bb6a;" data-color="#66bb6a"></div>
                <div class="color-opt" style="background:#ffa726;" data-color="#ffa726"></div>
                <div class="color-opt" style="background:#ab47bc;" data-color="#ab47bc"></div>
                <div class="color-opt" style="background:#78909c;" data-color="#78909c"></div>
                <div class="color-opt" style="background:#e91e63;" data-color="#e91e63"></div>
                <div class="color-opt" style="background:#1565c0;" data-color="#1565c0"></div>
            </div>

            <div id="existing-events" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button id="btn-save-ev">Salva evento</button>
            <button id="btn-close-modal" style="background:none; color:#999; margin-top:5px; font-size:0.8rem;">Chiudi</button>
        </div>
    </div>

    <div id="cd-modal-overlay">
        <div class="modal">
            <h3>⏳ Countdown</h3>
            <input type="text" id="cd-input-title" placeholder="Titolo evento">
            <input type="date" id="cd-input-date">
            <button id="btn-save-cd">Salva</button>
            <button id="btn-close-cd" style="background:none; color:#999; margin-top:5px; font-size:0.8rem;">Annulla</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMOZrpNFGkfZ9uT3gLU80BOkxhVCZyXF0",
            authDomain: "love-4407a.firebaseapp.com",
            databaseURL: "https://love-4407a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "love-4407a",
            storageBucket: "love-4407a.firebasestorage.app",
            messagingSenderId: "320582694033",
            appId: "1:320582694033:web:1c6b755c4fe7583569fb30"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ── Colori predefiniti per utente ──────────────────────────────
        const USER_DEFAULT_COLORS = {
            "gabrieleguarini1@gmail.com": "#1565c0",   // blu
            "m.vittoriapiovaccari@gmail.com": "#e91e63" // rosa
        };

        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pwd = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');
            errorMsg.style.display = 'none';
            signInWithEmailAndPassword(auth, email, pwd)
                .catch(err => {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = "Errore: " + err.code.replace('auth/', '');
                });
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initApp(user);
            } else {
                document.getElementById('login-container').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function initApp(user) {
            let allEvents = {};
            let currentViewDate = new Date();
            let selectedDate = "";
            let activeCdSlot = 1;

            // Colore predefinito basato sull'utente loggato
            const userEmail = user.email.toLowerCase();
            let selectedColor = USER_DEFAULT_COLORS[userEmail] || "#ef5350";

            // ── Imposta visivamente il colore selezionato ──────────────
            function setSelectedColorUI(color) {
                selectedColor = color;
                document.querySelectorAll('.color-opt').forEach(o => {
                    o.classList.toggle('selected', o.dataset.color === color);
                });
            }

            // Imposta il default al caricamento
            setSelectedColorUI(selectedColor);

            // ── Note ───────────────────────────────────────────────────
            const rNote = ref(db, 'note');
            onValue(rNote, s => document.getElementById('note-area').value = s.val() || "");
            document.getElementById('note-area').oninput = e => set(rNote, e.target.value);

            // ── Spesa ──────────────────────────────────────────────────
            const rShop = ref(db, 'shop');
            document.getElementById('btn-add-shop').onclick = () => {
                const i = document.getElementById('shop-input');
                if (i.value.trim()) { push(rShop, i.value.trim()); i.value = ''; }
            };
            document.getElementById('shop-input').onkeydown = e => {
                if (e.key === 'Enter') document.getElementById('btn-add-shop').click();
            };
            onValue(rShop, s => {
                const list = document.getElementById('shop-list'); list.innerHTML = '';
                const data = s.val();
                for (let id in data) {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${data[id]}</span><b style="color:red; cursor:pointer; font-size:1.1rem;">×</b>`;
                    li.querySelector('b').onclick = () => remove(ref(db, `shop/${id}`));
                    list.appendChild(li);
                }
            });

            // ── Eventi ─────────────────────────────────────────────────
            const rEv = ref(db, 'events');
            onValue(rEv, s => {
                allEvents = s.val() || {};
                renderCalendar();
                // Se il modal è aperto, aggiorna la lista eventi (fix bug eliminazione)
                if (document.getElementById('modal-overlay').style.display === 'flex' && selectedDate) {
                    renderExistingEvents(selectedDate);
                }
            });

            // ── Funzione che renderizza la lista eventi nel modal ───────
            function renderExistingEvents(dateStr) {
                const listDiv = document.getElementById('existing-events');
                listDiv.innerHTML = "";
                const eventsForDay = Object.entries(allEvents).filter(([, ev]) => ev.d === dateStr);
                if (eventsForDay.length === 0) {
                    listDiv.innerHTML = '<p style="font-size:0.78rem; color:#aaa; text-align:center; margin:4px 0;">Nessun evento per questo giorno</p>';
                    return;
                }
                // Ordina per orario di inizio
                eventsForDay.sort((a, b) => (a[1].ts || "").localeCompare(b[1].ts || ""));
                eventsForDay.forEach(([id, ev]) => {
                    const row = document.createElement('div');
                    row.className = 'existing-event-row';
                    const timeLabel = ev.ts && ev.te ? `${ev.ts}–${ev.te}` : (ev.ts ? ev.ts : '');
                    row.innerHTML = `
                        <span class="ev-dot" style="background:${ev.c || '#ccc'}"></span>
                        <span class="ev-label">${ev.t}</span>
                        ${timeLabel ? `<span class="ev-time">${timeLabel}</span>` : ''}
                        <span class="ev-del">Elimina</span>
                    `;
                    row.querySelector('.ev-del').onclick = () => {
                        remove(ref(db, `events/${id}`));
                        // La lista si aggiornerà automaticamente tramite onValue
                    };
                    listDiv.appendChild(row);
                });
            }

            // ── Apertura modal ─────────────────────────────────────────
            window.openModal = (dateStr) => {
                selectedDate = dateStr;
                document.getElementById('modal-overlay').style.display = 'flex';
                // Formatta la data in italiano
                const parts = dateStr.split('-');
                const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
                document.getElementById('modal-date-title').innerText =
                    d.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
                document.getElementById('event-text').value = '';
                document.getElementById('event-time-start').value = '';
                document.getElementById('event-time-end').value = '';
                // Ripristina il colore di default utente
                setSelectedColorUI(USER_DEFAULT_COLORS[userEmail] || "#ef5350");
                renderExistingEvents(dateStr);
            };

            // ── Salva evento ───────────────────────────────────────────
            document.getElementById('btn-save-ev').onclick = () => {
                const t = document.getElementById('event-text').value.trim();
                const ts = document.getElementById('event-time-start').value;
                const te = document.getElementById('event-time-end').value;
                if (t) {
                    push(rEv, { t, d: selectedDate, c: selectedColor, ts: ts || '', te: te || '' });
                    document.getElementById('event-text').value = '';
                    document.getElementById('event-time-start').value = '';
                    document.getElementById('event-time-end').value = '';
                    // Non chiude il modal: così si può aggiungere più eventi
                }
            };

            function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
            document.getElementById('btn-close-modal').onclick = closeModal;

            // ── Selezione colore ───────────────────────────────────────
            document.querySelectorAll('.color-opt').forEach(opt => {
                opt.onclick = () => setSelectedColorUI(opt.dataset.color);
            });

            // ── Countdown ──────────────────────────────────────────────
            const rCd = ref(db, 'countdowns');
            document.getElementById('cd1').onclick = () => { activeCdSlot = 1; document.getElementById('cd-modal-overlay').style.display = 'flex'; };
            document.getElementById('cd2').onclick = () => { activeCdSlot = 2; document.getElementById('cd-modal-overlay').style.display = 'flex'; };
            document.getElementById('btn-close-cd').onclick = () => document.getElementById('cd-modal-overlay').style.display = 'none';

            document.getElementById('btn-save-cd').onclick = () => {
                const t = document.getElementById('cd-input-title').value.trim();
                const d = document.getElementById('cd-input-date').value;
                if (t && d) {
                    set(ref(db, `countdowns/cd${activeCdSlot}`), { t, d });
                    document.getElementById('cd-input-title').value = '';
                    document.getElementById('cd-input-date').value = '';
                    document.getElementById('cd-modal-overlay').style.display = 'none';
                }
            };

            onValue(rCd, s => {
                const data = s.val() || {};
                [1, 2].forEach(n => {
                    const item = data[`cd${n}`] || { t: 'Clicca per impostare', d: '' };
                    document.getElementById(`cd-title-${n}`).innerText = item.t;
                    if (item.d) {
                        // Calcolo corretto: confronto solo date (senza orario)
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const target = new Date(item.d + 'T00:00:00');
                        const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
                        const el = document.getElementById(`cd-days-${n}`);
                        if (diff > 0) {
                            el.innerText = diff;
                            el.style.color = 'var(--primary)';
                        } else if (diff === 0) {
                            el.innerText = '🎉';
                            el.style.color = '#e91e63';
                        } else {
                            el.innerText = Math.abs(diff);
                            el.style.color = '#bbb';
                        }
                    } else {
                        document.getElementById(`cd-days-${n}`).innerText = '—';
                    }
                });
            });

            // ── Navigazione mesi ───────────────────────────────────────
            document.getElementById('prevMonth').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                renderCalendar();
            };
            document.getElementById('nextMonth').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                renderCalendar();
            };

            // ── Render calendario ──────────────────────────────────────
            function renderCalendar() {
                const grid = document.getElementById('calendar-days');
                const year = currentViewDate.getFullYear();
                const month = currentViewDate.getMonth();
                document.getElementById('current-month-display').innerText =
                    new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(currentViewDate);
                grid.innerHTML = '';

                // Intestazioni giorni
                ["L","M","M","G","V","S","D"].forEach(d => {
                    grid.innerHTML += `<div style="text-align:center; font-size:0.62rem; font-weight:700; color:#bbb; padding-bottom:4px;">${d}</div>`;
                });

                const first = new Date(year, month, 1).getDay();
                const offset = first === 0 ? 6 : first - 1;
                for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const todayStr = new Date().toDateString();

                for (let d = 1; d <= daysInMonth; d++) {
                    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const isToday = new Date(year, month, d).toDateString() === todayStr;

                    const el = document.createElement('div');
                    el.className = `day${isToday ? ' today' : ''}`;

                    // Numero giorno
                    const numSpan = document.createElement('span');
                    numSpan.className = 'day-num';
                    numSpan.textContent = d;
                    el.appendChild(numSpan);

                    // Chip eventi
                    const eventsForDay = Object.values(allEvents)
                        .filter(ev => ev.d === ds)
                        .sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));

                    eventsForDay.forEach(ev => {
                        const chip = document.createElement('div');
                        chip.className = 'event-chip';
                        chip.style.background = ev.c || '#999';
                        const timeLabel = ev.ts && ev.te ? `${ev.ts}–${ev.te}` : (ev.ts ? ev.ts : '');
                        chip.innerHTML = `${ev.t}${timeLabel ? `<span class="chip-time">${timeLabel}</span>` : ''}`;
                        el.appendChild(chip);
                    });

                    el.onclick = () => openModal(ds);
                    grid.appendChild(el);
                }
            }

            renderCalendar();
        }
    </script>
</body>
</html>
