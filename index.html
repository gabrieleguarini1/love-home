    <style>
        :root { --bg-color: #f3e5f5; --primary: #7e57c2; --primary-dark: #5e35b1; --text-dark: #2d3436; --glass: rgba(255, 255, 255, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); min-height: 100vh; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; }
        
        #login-container { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; margin-top: 50px; text-align: center; }
        .login-card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .card { background: var(--glass); border-radius: 24px; padding: 18px; box-shadow: 0 8px 32px rgba(126, 87, 194, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); }
        h1 { text-align: center; color: var(--primary-dark); margin: 5px 0 15px 0; font-size: 1.5rem; }
        h2 { font-weight: 600; font-size: 1rem; margin: 0; color: var(--primary); }
        textarea, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; font-family: inherit; font-size: 16px; }
        button { background: var(--primary-dark); color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        
        /* Calendario */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { min-height: 72px; background: white; border-radius: 10px; padding: 5px 4px; font-size: 0.72rem; cursor: pointer; display: flex; flex-direction: column; border: 1px solid transparent; }
        .day:hover { background: #f0ebff; }
        .day.today { border: 2px solid var(--primary); }
        .day-num { font-weight: 700; font-size: 0.75rem; margin-bottom: 2px; color: #444; }
        .event-chip { color: white; font-size: 0.55rem; line-height: 1.3; padding: 2px 4px; border-radius: 5px; margin-top: 2px; word-break: break-word; }

        /* Testa o Croce */
        .coin-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px; }
        .coin { width: 80px; height: 80px; position: relative; transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .coin div { width: 100%; height: 100%; border-radius: 50%; position: absolute; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .side-meri { background: #e91e63; color: white; }
        .side-gabri { background: #1565c0; color: white; transform: rotateY(180deg); }
        .flipping { animation: flip 0.2s infinite linear; }
        @keyframes flip { 0% { transform: rotateY(0); } 100% { transform: rotateY(180deg); } }

        /* Countdown & Altri */
        .countdown-container { display: flex; gap: 10px; }
        .countdown-card { flex: 1; background: white; padding: 12px; border-radius: 20px; text-align: center; cursor: pointer; }
        .cd-number { font-size: 1.6rem; font-weight: 600; color: var(--primary); display: block; }
        #modal-overlay, #cd-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: white; padding: 20px; border-radius: 24px; width: 90%; max-width: 380px; }
        #shop-list li { display: flex; justify-content: space-between; background: #f8f9fa; padding: 8px; border-radius: 8px; margin-bottom: 4px; }
        .color-opt { width: 28px; height: 28px; border-radius: 6px; cursor: pointer; border: 3px solid transparent; }
        .color-opt.selected { border: 3px solid #222; }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>MeriGabri 🏠</h1>
        <div class="login-card">
            <h2>Accesso Riservato</h2>
            <input type="email" id="login-email" placeholder="La tua email">
            <input type="password" id="login-password" placeholder="La tua password">
            <button id="btn-login">Entra</button>
            <p id="login-error" style="color:red; font-size:0.8rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="main-app" class="container">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1>MeriGabri 🏠</h1>
            <button id="btn-logout" style="width: auto; padding: 5px 10px; font-size: 0.7rem; background: #999;">Esci</button>
        </div>

        <div class="card" style="background: #fff9c4;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>💌 Note</h2>
                <button id="btn-post-note" style="width: auto; padding: 6px 12px; font-size: 0.75rem; background: #fbc02d; color: #4e342e; border-radius: 8px;">Avvisa 🔔</button>
            </div>
            <textarea id="note-area" placeholder="Scrivi qui..." style="margin-bottom: 0;"></textarea>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <button id="prevMonth" style="border:none; background:none; font-size:1.4rem; width:auto; padding:0 8px;">‹</button>
                <h2 id="current-month-display" style="margin:0; font-size:1.05rem;">Mese</h2>
                <button id="nextMonth" style="border:none; background:none; font-size:1.4rem; width:auto; padding:0 8px;">›</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div class="countdown-container">
            <div class="countdown-card" id="cd1">
                <div id="cd-title-1" style="font-size:0.7rem; font-weight:600;">Evento 1</div>
                <span id="cd-days-1" class="cd-number">—</span>
                <span style="font-size:0.6rem; color:#999;">GIORNI</span>
            </div>
            <div class="countdown-card" id="cd2">
                <div id="cd-title-2" style="font-size:0.7rem; font-weight:600;">Evento 2</div>
                <span id="cd-days-2" class="cd-number">—</span>
                <span style="font-size:0.6rem; color:#999;">GIORNI</span>
            </div>
        </div>

        <div class="card" style="background:#e3f2fd;">
            <h2>🛒 Spesa</h2>
            <div style="display:flex; gap:5px;"><input type="text" id="shop-input" style="margin:0;"><button id="btn-add-shop" style="padding:0 15px; border-radius:10px; border:none; background:#1976d2; color:white; width:auto;">+</button></div>
            <ul id="shop-list" style="list-style:none; padding:0; margin-top:10px;"></ul>
        </div>

        <div class="card" style="background:#f1f2f6;">
            <h2 style="text-align:center; margin-bottom:15px;">🪙 Chi selapinder?</h2>
            <div class="coin-container">
                <div class="coin" id="coin">
                    <div class="side-meri">Meri</div>
                    <div class="side-gabri">Gabri</div>
                </div>
                <button id="btn-flip" style="margin-top:10px; background:var(--primary);">Lancia!</button>
                <div id="flip-result" style="font-weight:600; color:var(--primary-dark); height: 20px;"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="modal-date-title" style="margin-top:0; color: var(--primary-dark);">Data</h3>
            <input type="text" id="event-text" placeholder="Cosa facciamo?">
            <div class="time-row" style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                <label style="font-size:0.8rem;">Dalle</label>
                <input type="time" id="event-time-start" style="margin:0;">
                <label style="font-size:0.8rem;">Alle</label>
                <input type="time" id="event-time-end" style="margin:0;">
            </div>
            <div style="display:flex; justify-content:space-around; margin-bottom:15px; flex-wrap:wrap; gap:6px;" id="color-picker">
                <div class="color-opt" style="background:#ef5350;" data-color="#ef5350"></div>
                <div class="color-opt" style="background:#42a5f5;" data-color="#42a5f5"></div>
                <div class="color-opt" style="background:#66bb6a;" data-color="#66bb6a"></div>
                <div class="color-opt" style="background:#ffa726;" data-color="#ffa726"></div>
                <div class="color-opt" style="background:#e91e63;" data-color="#e91e63"></div>
                <div class="color-opt" style="background:#1565c0;" data-color="#1565c0"></div>
            </div>
            <div id="existing-events" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button id="btn-save-ev">Salva evento</button>
            <button id="btn-close-modal" style="background:none; color:#999; margin-top:5px;">Chiudi</button>
        </div>
    </div>

    <div id="cd-modal-overlay">
        <div class="modal">
            <h3>⏳ Countdown</h3>
            <input type="text" id="cd-input-title" placeholder="Titolo evento">
            <input type="date" id="cd-input-date">
            <button id="btn-save-cd">Salva</button>
            <button id="btn-close-cd" style="background:none; color:#999; margin-top:5px;">Annulla</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMOZrpNFGkfZ9uT3gLU80BOkxhVCZyXF0",
            authDomain: "love-4407a.firebaseapp.com",
            databaseURL: "https://love-4407a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "love-4407a",
            storageBucket: "love-4407a.firebasestorage.app",
            messagingSenderId: "320582694033",
            appId: "1:320582694033:web:1c6b755c4fe7583569fb30"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- FUNZIONE NOTIFICA SICURA E PULITISSIMA ---
        // Usiamo i parametri nell'URL: così bypassiamo la sicurezza rigida del telefono 
        // ed evitiamo di mostrare "ntfy.sh/..." a schermo!
        function inviaNotifica(titolo, messaggio, tag) {
            // EncodeURIComponent serve a far digerire spazi e faccine all'URL
            const url = `https://ntfy.sh/merigabri_calendariosegreto_17462819?title=${encodeURIComponent(titolo)}&tags=${tag}`;
            fetch(url, {
                method: 'POST',
                body: messaggio
            }).catch(e => console.log("Errore invio notifica:", e));
        }

        // --- TESTA O CROCE LOGIC ---
        const btnFlip = document.getElementById('btn-flip');
        const coin = document.getElementById('coin');
        const flipResult = document.getElementById('flip-result');

        btnFlip.onclick = () => {
            btnFlip.disabled = true;
            flipResult.innerText = "Lancio in corso...";
            const result = Math.random() < 0.5 ? 'Meri' : 'Gabri';
            
            // Animazione
            coin.style.transition = 'none';
            coin.style.transform = 'rotateY(0)';
            
            setTimeout(() => {
                coin.style.transition = 'transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                const rotations = 10; // Quanti giri fa
                const extraDeg = result === 'Meri' ? 0 : 180;
                coin.style.transform = `rotateY(${rotations * 180 + extraDeg}deg)`;
            }, 50);

            setTimeout(() => {
                flipResult.innerText = `L'ha pijatander ${result}! ✨`;
                btnFlip.disabled = false;
            }, 1600);
        };

        // --- RESTO DELL'APP ---
        const USER_DEFAULT_COLORS = {
            "gabrieleguarini1@gmail.com": "#1565c0",
            "m.vittoriapiovaccari@gmail.com": "#e91e63"
        };

        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('login-email').value;
            const pwd = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pwd).catch(err => {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').innerText = "Errore: " + err.code;
            });
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initApp(user);
            } else {
                document.getElementById('login-container').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function initApp(user) {
            const userEmail = user.email.toLowerCase();
            const author = userEmail.includes('gabri') ? 'Gabri 👱‍♂️' : 'Meri 👩🏻';
            let allEvents = {};
            let currentViewDate = new Date();
            let selectedDate = "";
            let selectedColor = USER_DEFAULT_COLORS[userEmail] || "#ef5350";

            // Gestione Note
            const rNote = ref(db, 'note');
            const noteArea = document.getElementById('note-area');
            onValue(rNote, s => { if (document.activeElement !== noteArea) noteArea.value = s.val() || ""; });
            noteArea.oninput = e => set(rNote, e.target.value);

            // PULSANTE AVVISA NOTE
            document.getElementById('btn-post-note').onclick = () => {
                const text = noteArea.value.trim();
                if (text) {
                    // Manda la notifica pulita con titolo "MeriGabri Hub" e tag memo
                    inviaNotifica("MeriGabri Hub", `${author} ha scritto: "${text.substring(0,60)}..."`, "memo");
                }
            };

            // Spesa
            const rShop = ref(db, 'shop');
            document.getElementById('btn-add-shop').onclick = () => {
                const i = document.getElementById('shop-input');
                if (i.value.trim()) { push(rShop, i.value.trim()); i.value = ''; }
            };
            onValue(rShop, s => {
                const list = document.getElementById('shop-list'); list.innerHTML = '';
                const data = s.val();
                for (let id in data) {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${data[id]}</span><b style="color:red; cursor:pointer;">×</b>`;
                    li.querySelector('b').onclick = () => remove(ref(db, `shop/${id}`));
                    list.appendChild(li);
                }
            });

            // Gestione Colori nel Modale
            document.querySelectorAll('.color-opt').forEach(opt => {
                opt.onclick = () => {
                    document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedColor = opt.dataset.color;
                };
                if(opt.dataset.color === selectedColor) {
                    opt.classList.add('selected');
                }
            });

            // Calendario ed Eventi
            const rEv = ref(db, 'events');
            onValue(rEv, s => { 
                allEvents = s.val() || {}; 
                renderCalendar(); 
                if(selectedDate !== "") renderExistingEvents(selectedDate);
            });

            window.openModal = (ds) => {
                selectedDate = ds;
                document.getElementById('modal-overlay').style.display = 'flex';
                document.getElementById('modal-date-title').innerText = ds;
                document.getElementById('event-text').value = "";
                renderExistingEvents(ds);
            };

            function renderExistingEvents(ds) {
                const div = document.getElementById('existing-events');
                div.innerHTML = "";
                const evs = Object.entries(allEvents).filter(([id, e]) => e.d === ds);
                evs.forEach(([id, e]) => {
                    const item = document.createElement('div');
                    item.style = "display:flex; justify-content:space-between; font-size:0.8rem; background:#eee; padding:5px; border-radius:5px; margin-bottom:5px;";
                    item.innerHTML = `<span>${e.t}</span><span style="color:red; cursor:pointer; font-weight:bold;">X</span>`;
                    item.querySelector('span:last-child').onclick = () => {
                        remove(ref(db, `events/${id}`));
                        // Notifica per evento rimosso
                        inviaNotifica("MeriGabri Hub", `${author} ha eliminato l'evento:\n"${e.t}" del ${ds}`, "wastebasket");
                    };
                    div.appendChild(item);
                });
            }

            document.getElementById('btn-save-ev').onclick = () => {
                const t = document.getElementById('event-text').value;
                if (t) {
                    push(rEv, { 
                        t, d: selectedDate, c: selectedColor, 
                        ts: document.getElementById('event-time-start').value,
                        te: document.getElementById('event-time-end').value
                    });
                    
                    // Notifica per nuovo evento
                    inviaNotifica("MeriGabri Hub", `${author} ha aggiunto:\n"${t}" per il ${selectedDate}`, "calendar");

                    document.getElementById('event-text').value = "";
                    document.getElementById('modal-overlay').style.display = 'none';
                }
            };

            document.getElementById('btn-close-modal').onclick = () => {
                document.getElementById('modal-overlay').style.display = 'none';
                selectedDate = "";
            };

            // Countdown Logic
            const rCd = ref(db, 'countdowns');
            let activeCd = 1;

            document.getElementById('cd1').onclick = () => {
                activeCd = 1;
                document.getElementById('cd-modal-overlay').style.display = 'flex';
            };
            
            document.getElementById('cd2').onclick = () => {
                activeCd = 2;
                document.getElementById('cd-modal-overlay').style.display = 'flex';
            };

            document.getElementById('btn-save-cd').onclick = () => {
                const t = document.getElementById('cd-input-title').value;
                const d = document.getElementById('cd-input-date').value;
                if(t && d) {
                    set(ref(db, `countdowns/cd${activeCd}`), {t, d});
                }
                document.getElementById('cd-modal-overlay').style.display = 'none';
                document.getElementById('cd-input-title').value = "";
                document.getElementById('cd-input-date').value = "";
            };

            document.getElementById('btn-close-cd').onclick = () => {
                document.getElementById('cd-modal-overlay').style.display = 'none';
            };

            onValue(rCd, s => {
                const data = s.val() || {};
                [1,2].forEach(n => {
                    const c = data[`cd${n}`];
                    if (c) {
                        document.getElementById(`cd-title-${n}`).innerText = c.t;
                        const diff = Math.ceil((new Date(c.d) - new Date()) / (1000*60*60*24));
                        document.getElementById(`cd-days-${n}`).innerText = diff >= 0 ? diff : "🎉";
                    }
                });
            });

            // Navigazione Mese Calendario
            document.getElementById('prevMonth').onclick = () => { currentViewDate.setMonth(currentViewDate.getMonth() - 1); renderCalendar(); };
            document.getElementById('nextMonth').onclick = () => { currentViewDate.setMonth(currentViewDate.getMonth() + 1); renderCalendar(); };

            function renderCalendar() {
                const grid = document.getElementById('calendar-days');
                const year = currentViewDate.getFullYear();
                const month = currentViewDate.getMonth();
                document.getElementById('current-month-display').innerText = new Intl.DateTimeFormat('it-IT', { month:'long', year:'numeric' }).format(currentViewDate);
                grid.innerHTML = '';
                ["L","M","M","G","V","S","D"].forEach(d => grid.innerHTML += `<div style="text-align:center; font-size:0.6rem; font-weight:700; color:#999;">${d}</div>`);
                
                const firstDay = new Date(year, month, 1).getDay();
                const offset = firstDay === 0 ? 6 : firstDay - 1;
                for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

                const days = new Date(year, month + 1, 0).getDate();
                for (let d = 1; d <= days; d++) {
                    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const el = document.createElement('div');
                    el.className = 'day';
                    
                    // Highlight today
                    const todayStr = new Date().toISOString().split('T')[0];
                    if (ds === todayStr) {
                        el.classList.add('today');
                    }

                    el.innerHTML = `<span class="day-num">${d}</span>`;
                    Object.values(allEvents).filter(e => e.d === ds).forEach(e => {
                        el.innerHTML += `<div class="event-chip" style="background:${e.c}">${e.t}</div>`;
                    });
                    el.onclick = () => window.openModal(ds);
                    grid.appendChild(el);
                }
            }

            renderCalendar();
        }
    </script>
</body>
</html>
